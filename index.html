<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Butterfly iPod</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
    }

    /* Full-page background */
    #bg {
      position: fixed; inset: 0;
      background: url('wallpaper.jpg') center center / cover no-repeat;
      z-index: 0;
    }

    /* Draggable iPod container */
    #ipod-wrapper {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      cursor: grab;
      user-select: none;
      -webkit-user-select: none;
      /* Width controls the size of the whole iPod — adjust to taste */
      width: 340px;
    }
    #ipod-wrapper:active { cursor: grabbing; }

    /* Relative container so screen + SVG overlay align to the PNG */
    #ipod-body {
      position: relative;
      width: 100%;
    }

    /* The butterfly.png skin */
    #butterfly-img {
      width: 100%;
      display: block;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    /*
      Screen overlay — positioned to sit exactly over the blue rect in the SVG.
      SVG viewBox = 595 × 510
      Blue rect:  x=219.42  y=156.56  w=153.15  h=141.21  rx=30

      As percentages of the viewBox:
        left   = 219.42 / 595  = 36.88%
        top    = 156.56 / 510  = 30.70%
        width  = 153.15 / 595  = 25.74%
        height = 141.21 / 510  = 27.69%
    */
    #screen {
      position: absolute;
      left:   36.88%;
      top:    30.70%;
      width:  25.74%;
      height: 27.69%;
      border-radius: 10%;   /* mirrors the rx=30 on the SVG rect */
      overflow: hidden;
      background: #0a1020;
    }

    #screen img.song-art {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.45s ease;
      pointer-events: none;
    }
    #screen img.song-art.active { opacity: 1; }

    /* SVG overlay — same size as the PNG, sits on top */
    #ipod-svg-overlay {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      pointer-events: none; /* passthrough by default */
    }
    #ipod-svg-overlay svg {
      width: 100%; height: 100%;
      display: block;
    }

    /* Button hit areas inside the SVG get pointer events */
    .btn-hit {
      pointer-events: all;
      cursor: pointer;
      fill: transparent;
      stroke: none;
    }
    .btn-hit:active { opacity: 0.35; }
  </style>
</head>
<body>

<div id="bg"></div>

<div id="ipod-wrapper">
  <div id="ipod-body">

    <!-- 1. iPod skin image -->
    <img id="butterfly-img" src="butterfly.png" alt="iPod" />

    <!-- 2. Screen: song artwork sits here -->
    <div id="screen">
      <img class="song-art" id="song-art-1" src="song 1 picture.jpeg" alt="" />
      <img class="song-art" id="song-art-2" src="song 2 picture.png"  alt="" />
      <img class="song-art" id="song-art-3" src="song 3 picture.jpg"  alt="" />
    </div>

    <!-- 3. SVG overlay: transparent hit areas mapped to exact button positions -->
    <div id="ipod-svg-overlay">
      <!--
        All coordinates are from the original SVG viewBox 595 × 510.
        Hit areas are slightly enlarged for comfortable tapping.
      -->
      <svg viewBox="0 0 595 510"
           xmlns="http://www.w3.org/2000/svg"
           preserveAspectRatio="xMidYMid meet">

        <!-- PLAY  — triangle pointing down, centred ~(295, 440) -->
        <polygon id="btn-play"
                 class="btn-hit"
                 points="268,422 322,422 295,458" />

        <!-- PAUSE — two vertical rects side by side, centred ~(308, 440) -->
        <rect id="btn-pause"
              class="btn-hit"
              x="293" y="424" width="30" height="24" />

        <!-- PREV  — left-pointing triangle, centred ~(240, 385) -->
        <polygon id="btn-prev"
                 class="btn-hit"
                 points="265,362 265,408 218,385" />

        <!-- NEXT  — right-pointing triangle, centred ~(350, 385) -->
        <polygon id="btn-next"
                 class="btn-hit"
                 points="327,362 327,408 374,385" />

      </svg>
    </div>

  </div><!-- /ipod-body -->
</div><!-- /ipod-wrapper -->

<!-- Audio -->
<audio id="audio-1" src="song 1.mp3" preload="auto"></audio>
<audio id="audio-2" src="song 2.mp3" preload="auto"></audio>
<audio id="audio-3" src="song 3.mp3" preload="auto"></audio>

<script>
/* ═══════════════════════════════════════════
   DRAG
═══════════════════════════════════════════ */
const wrapper = document.getElementById('ipod-wrapper');
let dragging = false, startX = 0, startY = 0;

wrapper.addEventListener('mousedown', startDrag);
wrapper.addEventListener('touchstart', startDrag, { passive: true });

function startDrag(e) {
  // Don't start drag when clicking a button
  if (e.target.closest('.btn-hit')) return;
  dragging = true;
  const rect = wrapper.getBoundingClientRect();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  startX = cx - rect.left;
  startY = cy - rect.top;
  // Switch from transform centering to absolute px positioning
  wrapper.style.transform = 'none';
  wrapper.style.left = rect.left + 'px';
  wrapper.style.top  = rect.top  + 'px';
}

document.addEventListener('mousemove', onDrag);
document.addEventListener('touchmove', onDrag, { passive: false });
function onDrag(e) {
  if (!dragging) return;
  if (e.cancelable) e.preventDefault();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  wrapper.style.left = (cx - startX) + 'px';
  wrapper.style.top  = (cy - startY) + 'px';
}
document.addEventListener('mouseup',  () => { dragging = false; });
document.addEventListener('touchend', () => { dragging = false; });


/* ═══════════════════════════════════════════
   PLAYER
═══════════════════════════════════════════ */
const songs = [
  {
    audio: document.getElementById('audio-1'),
    art:   document.getElementById('song-art-1')
  },
  {
    audio: document.getElementById('audio-2'),
    art:   document.getElementById('song-art-2')
  },
  {
    audio: document.getElementById('audio-3'),
    art:   document.getElementById('song-art-3')
  }
];

let current = 0;
let playing = false;

function showArt(index) {
  songs.forEach((s, i) => s.art.classList.toggle('active', i === index));
}

function stopAll() {
  songs.forEach(s => { s.audio.pause(); s.audio.currentTime = 0; });
  playing = false;
}

function playSong(index) {
  stopAll();
  current = index;
  songs[current].audio.play().catch(() => {});
  playing = true;
  showArt(current);
}

function pauseSong() {
  if (!playing) return;
  songs[current].audio.pause();
  playing = false;
}

function resumeSong() {
  if (playing) return;
  songs[current].audio.play().catch(() => {});
  playing = true;
}

// Auto-advance when a track ends
songs.forEach((s, i) => {
  s.audio.addEventListener('ended', () => {
    playSong((i + 1) % songs.length);
  });
});


/* ═══════════════════════════════════════════
   BUTTON WIRING
═══════════════════════════════════════════ */
document.getElementById('btn-play').addEventListener('click', () => {
  if (!playing) {
    // If never started, start from beginning; if paused, resume
    songs[current].audio.currentTime > 0 ? resumeSong() : playSong(current);
  }
});

document.getElementById('btn-pause').addEventListener('click', () => {
  pauseSong();
});

document.getElementById('btn-prev').addEventListener('click', () => {
  const idx = (current - 1 + songs.length) % songs.length;
  playing ? playSong(idx) : (current = idx, showArt(idx));
});

document.getElementById('btn-next').addEventListener('click', () => {
  const idx = (current + 1) % songs.length;
  playing ? playSong(idx) : (current = idx, showArt(idx));
});
</script>
</body>
</html>
