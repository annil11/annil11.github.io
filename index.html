@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#050505;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  font-family:'DM Sans',sans-serif;
  position:relative;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 50%, rgba(239,96,163,.15), transparent 35%),
    radial-gradient(circle at 80% 50%, rgba(239,96,163,.1), transparent 35%);
  pointer-events:none;
}

.scene{
  position:relative;
}

.player-wrap{
  width:595px;
  height:510px;
  position:relative;
  filter:
    drop-shadow(0 25px 40px rgba(239,96,163,.35))
    drop-shadow(0 10px 30px rgba(0,0,0,.8));
}

.music-note{
  position:absolute;
  color:#ffd1e6;
  font-size:24px;
  pointer-events:none;
  animation:floatNote 2.5s ease-out forwards;
  text-shadow:0 0 12px rgba(255,255,255,.7);
  z-index:9999;
}

@keyframes floatNote{
  0%{
    opacity:0;
    transform:translate(0,0) scale(.4) rotate(0deg);
  }

  20%{
    opacity:1;
  }

  100%{
    opacity:0;
    transform:
      translate(var(--nx),var(--ny))
      scale(1.4)
      rotate(40deg);
  }
}

.info-panel{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:-120px;
  width:340px;
  text-align:center;
  color:white;
}

.track-title{
  font-size:18px;
  font-weight:700;
}

.track-artist{
  font-size:13px;
  color:#ef60a3;
  margin-top:4px;
}

.progress-wrap{
  width:100%;
  height:5px;
  background:rgba(255,255,255,.08);
  border-radius:999px;
  margin-top:12px;
  overflow:hidden;
}

.progress{
  width:0%;
  height:100%;
  background:linear-gradient(90deg,#ef60a3,#ffd4ea);
  transition:width .2s linear;
}

.time-row{
  margin-top:6px;
  display:flex;
  justify-content:space-between;
  font-size:11px;
  color:rgba(255,255,255,.5);
}

.btn-zone{
  cursor:pointer;
}

#eqBars{
  opacity:0;
  transition:opacity .2s;
}

.playing #eqBars{
  opacity:1;
}

.playing #screenPlay{
  opacity:0;
}

@keyframes eq{
  0%,100%{height:6px;}
  50%{height:18px;}
}

.eq{
  animation:eq .7s infinite ease-in-out;
}

.eq:nth-child(2){animation-delay:.1s;}
.eq:nth-child(3){animation-delay:.2s;}
.eq:nth-child(4){animation-delay:.3s;}
.eq:nth-child(5){animation-delay:.4s;}
.eq:nth-child(6){animation-delay:.5s;}
