*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#050505;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  font-family:'DM Sans',sans-serif;
  position:relative;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 50%, rgba(239,96,163,.15), transparent 35%),
    radial-gradient(circle at 80% 50%, rgba(239,96,163,.1), transparent 35%);
  pointer-events:none;
}

.scene{
  position:relative;
}

.player-wrap{
  width:595px;
  height:510px;
  position:relative;
  filter:
    drop-shadow(0 25px 40px rgba(239,96,163,.35))
    drop-shadow(0 10px 30px rgba(0,0,0,.8));
}

.music-note{
  position:absolute;
  color:#ffd1e6;
  font-size:24px;
  pointer-events:none;
  animation:floatNote 2.5s ease-out forwards;
  text-shadow:0 0 12px rgba(255,255,255,.7);
  z-index:9999;
}

@keyframes floatNote{
  0%{
    opacity:0;
    transform:translate(0,0) scale(.4) rotate(0deg);
  }

  20%{
    opacity:1;
  }

  100%{
    opacity:0;
    transform:
      translate(var(--nx),var(--ny))
      scale(1.4)
      rotate(40deg);
  }
}

.info-panel{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:-120px;
  width:340px;
  text-align:center;
  color:white;
}

.track-title{
  font-size:18px;
  font-weight:700;
}

.track-artist{
  font-size:13px;
  color:#ef60a3;
  margin-top:4px;
}

.progress-wrap{
  width:100%;
  height:5px;
  background:rgba(255,255,255,.08);
  border-radius:999px;
  margin-top:12px;
  overflow:hidden;
}

.progress{
  width:0%;
  height:100%;
  background:linear-gradient(90deg,#ef60a3,#ffd4ea);
  transition:width .2s linear;
}

.time-row{
  margin-top:6px;
  display:flex;
  justify-content:space-between;
  font-size:11px;
  color:rgba(255,255,255,.5);
}

.btn-zone{
  cursor:pointer;
}

#eqBars{
  opacity:0;
  transition:opacity .2s;
}

.playing #eqBars{
  opacity:1;
}

.playing #screenPlay{
  opacity:0;
}

@keyframes eq{
  0%,100%{height:6px;}
  50%{height:18px;}
}

.eq{
  animation:eq .7s infinite ease-in-out;
}

.eq:nth-child(2){animation-delay:.1s;}
.eq:nth-child(3){animation-delay:.2s;}
.eq:nth-child(4){animation-delay:.3s;}
.eq:nth-child(5){animation-delay:.4s;}
.eq:nth-child(6){animation-delay:.5s;}

</style>

<script>

const tracks = [

{
title:"Butterfly",
artist:"Custom Upload",
file:"Butterfly(1).mp3"
},

{
title:"...Baby One More Time",
artist:"Britney Spears",
file:"_Baby One More Time(1).mp3"
},

{
title:"I Want It That Way",
artist:"Backstreet Boys",
file:"I Want It That Way(1).mp3"
}

];

const audio = new Audio();

let currentTrack = 0;
let isPlaying = false;

const screenTitle =
document.getElementById('screenTitle');

const screenArtist =
document.getElementById('screenArtist');

const progress =
document.getElementById('progress');

const screenProgress =
document.getElementById('screenProgress');

const infoTitle =
document.getElementById('infoTitle');

const infoArtist =
document.getElementById('infoArtist');

const elapsedText =
document.getElementById('elapsedText');

const screenTime =
document.getElementById('screenTime');

const screenPlay =
document.getElementById('screenPlay');

const playerWrap =
document.getElementById('playerWrap');

function formatTime(sec){

const m = Math.floor(sec/60);
const s = Math.floor(sec%60);

return `${m}:${s.toString().padStart(2,'0')}`;

}

function loadTrack(index){

const t = tracks[index];

screenTitle.textContent = t.title;
screenArtist.textContent = t.artist;

infoTitle.textContent = t.title;
infoArtist.textContent = t.artist;

audio.src = t.file;

progress.style.width = '0%';
screenProgress.setAttribute('width',0);

elapsedText.textContent = '0:00';
screenTime.textContent = '0:00 / 1:00';

}

function play(){

audio.play();

isPlaying = true;

playerWrap.classList.add('playing');

screenPlay.textContent = '⏸';

spawnNoteBurst(12);

}

function pause(){

audio.pause();

isPlaying = false;

playerWrap.classList.remove('playing');

screenPlay.textContent = '▶';

spawnNoteBurst(6);

}

function togglePlay(){

if(isPlaying){
pause();
}else{
play();
}

}

function nextTrack(){

currentTrack++;

if(currentTrack >= tracks.length){
currentTrack = 0;
}

loadTrack(currentTrack);

if(isPlaying){
play();
}

spawnNoteBurst(10);

}

function prevTrack(){

currentTrack--;

if(currentTrack < 0){
currentTrack = tracks.length - 1;
}

loadTrack(currentTrack);

if(isPlaying){
play();
}

spawnNoteBurst(10);

}

function spawnNoteBurst(count=1){

const notes = ['♪','♫','♬','🎵'];

for(let i=0;i<count;i++){

const el = document.createElement('div');

el.className = 'music-note';

el.textContent =
notes[Math.floor(Math.random()*notes.length)];

const nx =
(Math.random()-.5)*220 + 'px';

const ny =
-(100 + Math.random()*200) + 'px';

el.style.setProperty('--nx',nx);
el.style.setProperty('--ny',ny);

el.style.left =
(240 + Math.random()*120) + 'px';

el.style.top =
(330 + Math.random()*100) + 'px';

el.style.fontSize =
(18 + Math.random()*20) + 'px';

document.body.appendChild(el);

setTimeout(()=>{
el.remove();
},2500);

}

}

audio.addEventListener('timeupdate',()=>{

if(audio.currentTime >= 60){

nextTrack();

return;

}

const percent =
(audio.currentTime / 60) * 100;

progress.style.width =
percent + '%';

screenProgress.setAttribute(
'width',
120 * percent / 100
);

elapsedText.textContent =
formatTime(audio.currentTime);

screenTime.textContent =
`${formatTime(audio.currentTime)} / 1:00`;

if(Math.random() > .7){
spawnNoteBurst(2);
}

});

audio.addEventListener('ended',()=>{
nextTrack();
});

document
.getElementById('btn-play')
.addEventListener('click',togglePlay);

document
.getElementById('btn-center')
.addEventListener('click',togglePlay);

document
.getElementById('btn-next')
.addEventListener('click',nextTrack);

document
.getElementById('btn-prev')
.addEventListener('click',prevTrack);

document.addEventListener('keydown',e=>{

if(e.code === 'Space'){
e.preventDefault();
togglePlay();
}

if(e.code === 'ArrowRight'){
nextTrack();
}

if(e.code === 'ArrowLeft'){
prevTrack();
}

});

loadTrack(0);

</script>
