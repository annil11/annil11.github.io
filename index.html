<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>Butterfly iPod</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  font-family:'DM Sans',sans-serif;
  position:relative;

  /* FULLSCREEN WALLPAPER */
  background:url("wallpaper.jpg") center center / cover no-repeat fixed;
}

/* OVERLAY GLOW */
body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 50%, rgba(239,96,163,.15), transparent 35%),
    radial-gradient(circle at 80% 50%, rgba(239,96,163,.1), transparent 35%);
  pointer-events:none;
}

/* SCENE */
.scene{
  position:relative;
}

/* PLAYER WRAP */
.player-wrap{
  width:595px;
  height:510px;
  position:relative;

  filter:
    drop-shadow(0 25px 40px rgba(239,96,163,.35))
    drop-shadow(0 10px 30px rgba(0,0,0,.8));

  touch-action:none;
  cursor:grab;
}

.player-wrap:active{
  cursor:grabbing;
}

/* FLOATING MUSIC NOTES */
.music-note{
  position:absolute;
  color:#ffd1e6;
  font-size:24px;
  pointer-events:none;
  animation:floatNote 2.5s ease-out forwards;
  text-shadow:0 0 12px rgba(255,255,255,.7);
  z-index:9999;
}

@keyframes floatNote{
  0%{
    opacity:0;
    transform:translate(0,0) scale(.4) rotate(0deg);
  }

  20%{
    opacity:1;
  }

  100%{
    opacity:0;
    transform:
      translate(var(--nx),var(--ny))
      scale(1.4)
      rotate(40deg);
  }
}

/* INFO PANEL */
.info-panel{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  bottom:-120px;
  width:340px;
  text-align:center;
  color:white;
}

.track-title{
  font-size:18px;
  font-weight:700;
}

.track-artist{
  font-size:13px;
  color:#ef60a3;
  margin-top:4px;
}

/* PROGRESS */
.progress-wrap{
  width:100%;
  height:5px;
  background:rgba(255,255,255,.08);
  border-radius:999px;
  margin-top:12px;
  overflow:hidden;
}

.progress{
  width:0%;
  height:100%;
  background:linear-gradient(90deg,#ef60a3,#ffd4ea);
  transition:width .2s linear;
}

/* TIME */
.time-row{
  margin-top:6px;
  display:flex;
  justify-content:space-between;
  font-size:11px;
  color:rgba(255,255,255,.5);
}

/* BUTTONS */
.btn-zone{
  cursor:pointer;
}

/* EQ */
#eqBars{
  opacity:0;
  transition:opacity .2s;
}

.playing #eqBars{
  opacity:1;
}

.playing #screenPlay{
  opacity:0;
}

/* EQ ANIMATION */
@keyframes eq{
  0%,100%{height:6px;}
  50%{height:18px;}
}

.eq{
  animation:eq .7s infinite ease-in-out;
}

.eq:nth-child(2){animation-delay:.1s;}
.eq:nth-child(3){animation-delay:.2s;}
.eq:nth-child(4){animation-delay:.3s;}
.eq:nth-child(5){animation-delay:.4s;}
.eq:nth-child(6){animation-delay:.5s;}

/* MOBILE */
@media(max-width:700px){

  .player-wrap{
    width:90vw;
    height:auto;
  }

  svg{
    width:100%;
    height:auto;
  }

}

</style>

<script>

/* SONGS */

const songs = [

{
title:"Song 1",
file:"song 1.mp3",
art:"song 1 picture.jpeg"
},

{
title:"Song 2",
file:"song 2.mp3",
art:"song 2 picture.png"
},

{
title:"Song 3",
file:"song 3.mp3",
art:"song 3 picture.jpg"
}

];

/* ELEMENTS */

const audio = document.getElementById("audio");

const infoTitle = document.getElementById("infoTitle");

const screenTitle = document.getElementById("screenTitle");

const albumArt = document.getElementById("albumArt");

const progress = document.getElementById("progress");

const screenProgress = document.getElementById("screenProgress");

const elapsedText = document.getElementById("elapsedText");

const durationText = document.getElementById("durationText");

const btnPlay = document.getElementById("btn-play");

const btnNext = document.getElementById("btn-next");

const btnPrev = document.getElementById("btn-prev");

const playerWrap = document.getElementById("playerWrap");

/* PLAYER */

let current = 0;

let playing = false;

/* LOAD SONG */

function loadSong(index){

audio.src = songs[index].file;

albumArt.src = songs[index].art;

infoTitle.innerText = songs[index].title;

screenTitle.innerText = songs[index].title;

}

loadSong(current);

/* PLAY */

function playSong(){

audio.play();

playing = true;

playerWrap.classList.add("playing");

spawnNotes();

}

/* PAUSE */

function pauseSong(){

audio.pause();

playing = false;

playerWrap.classList.remove("playing");

}

/* TOGGLE */

function togglePlay(){

if(playing){

pauseSong();

}else{

playSong();

}

}

/* NEXT */

function nextSong(){

current++;

if(current >= songs.length){

current = 0;

}

loadSong(current);

playSong();

}

/* PREV */

function prevSong(){

current--;

if(current < 0){

current = songs.length - 1;

}

loadSong(current);

playSong();

}

/* BUTTON EVENTS */

btnPlay.addEventListener("click", togglePlay);

btnNext.addEventListener("click", nextSong);

btnPrev.addEventListener("click", prevSong);

audio.addEventListener("ended", nextSong);

/* TIME */

audio.addEventListener("timeupdate", ()=>{

const percent =
(audio.currentTime / audio.duration) * 100;

progress.style.width = percent + "%";

screenProgress.setAttribute(
"width",
(120 * percent / 100)
);

elapsedText.innerText =
formatTime(audio.currentTime);

durationText.innerText =
formatTime(audio.duration);

});

/* FORMAT */

function formatTime(time){

if(isNaN(time)) return "0:00";

const mins = Math.floor(time / 60);

const secs = Math.floor(time % 60)
.toString()
.padStart(2,"0");

return `${mins}:${secs}`;

}

/* NOTES */

function spawnNotes(){

const note = document.createElement("div");

note.className = "music-note";

note.innerHTML = ["♪","♫","♬"][
Math.floor(Math.random()*3)
];

note.style.left =
(250 + Math.random()*100) + "px";

note.style.top =
(260 + Math.random()*50) + "px";

note.style.setProperty(
"--nx",
(Math.random()*200 - 100) + "px"
);

note.style.setProperty(
"--ny",
(-150 - Math.random()*100) + "px"
);

document.body.appendChild(note);

setTimeout(()=>{

note.remove();

},2500);

if(playing){

setTimeout(spawnNotes, 350);

}

}

/* DRAGGABLE */

let dragging = false;

let offsetX = 0;

let offsetY = 0;

playerWrap.addEventListener("mousedown", startDrag);

document.addEventListener("mousemove", drag);

document.addEventListener("mouseup", stopDrag);

function startDrag(e){

dragging = true;

const rect = playerWrap.getBoundingClientRect();

offsetX = e.clientX - rect.left;

offsetY = e.clientY - rect.top;

playerWrap.style.position = "absolute";

}

function drag(e){

if(!dragging) return;

playerWrap.style.left =
(e.clientX - offsetX) + "px";

playerWrap.style.top =
(e.clientY - offsetY) + "px";

}

function stopDrag(){

dragging = false;

}

</script>
