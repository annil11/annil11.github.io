      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, #382040 0%, #150f1f 45%, #060608 100%);
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }

    .glow {
      position: absolute;
      width: 900px;
      height: 900px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 85, 180, 0.18), transparent 60%);
      filter: blur(40px);
      pointer-events: none;
      animation: pulse 8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        opacity: 0.6;
      }

      50% {
        transform: scale(1.08);
        opacity: 1;
      }
    }

    .player {
      position: relative;
      width: 460px;
      height: 700px;
      filter: drop-shadow(0 30px 40px rgba(0,0,0,.65));
      animation: float 6s ease-in-out infinite;
    }

    @keyframes float {
      0%,100% {
        transform: translateY(0px);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .wing {
      fill: url(#wingGradient);
      stroke: #f6d9ef;
      stroke-width: 14;
      filter: url(#wingShadow);
      opacity: .94;
      backdrop-filter: blur(6px);
      transition: transform .5s ease;
      transform-origin: center;
    }

    .wing-inner {
      fill: rgba(255,255,255,.08);
      mix-blend-mode: screen;
      filter: blur(2px);
    }

    .body {
      fill: url(#bodyGradient);
      stroke: #f2dce9;
      stroke-width: 8;
      filter: url(#bodyShadow);
    }

    .screen {
      fill: url(#screenGradient);
      stroke: rgba(30,40,50,.8);
      stroke-width: 4;
      filter: url(#screenGlow);
    }

    .wheel {
      fill: url(#wheelGradient);
      stroke: #d34484;
      stroke-width: 4;
      cursor: pointer;
      transition: transform .18s ease;
      filter: drop-shadow(0 8px 16px rgba(0,0,0,.45));
    }

    .wheel:hover {
      transform: scale(1.02);
    }

    .wheel:active,
    .btn:active {
      transform: scale(.96);
    }

    .center-button {
      fill: rgba(255,255,255,.75);
      cursor: pointer;
      transition: .2s ease;
    }

    .center-button:hover {
      fill: white;
    }

    .btn {
      fill: transparent;
      cursor: pointer;
      transition: .15s ease;
    }

    .gold {
      fill: #a08f00;
      stroke: rgba(255,255,255,.25);
      stroke-width: 3;
      filter: drop-shadow(0 3px 4px rgba(0,0,0,.35));
    }

    .antenna {
      stroke: #f5e4ef;
      stroke-width: 10;
      stroke-linecap: round;
      filter: drop-shadow(0 4px 5px rgba(0,0,0,.4));
    }

    .antenna-tip {
      fill: #d4d44b;

    .screen-ui {
      position: absolute;
      left: 50%;
      top: 170px;
      transform: translateX(-50%);
      width: 240px;
      height: 180px;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #203040;
    }

    .track {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 12px;
      text-shadow: 0 1px 1px rgba(255,255,255,.7);
    }

    .artist {
      font-size: 14px;
      opacity: .8;
      margin-bottom: 24px;
    }

    .status {
      font-size: 13px;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: .75;
      margin-top: 16px;
    }

    .progress-wrap {
      width: 100%;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(0,0,0,.15);
      box-shadow: inset 0 2px 4px rgba(0,0,0,.2);
    }

    .progress {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #ff69b4, #ff95cf);
      transition: width .1s linear;
    }

    .visualizer {
      display: flex;
      align-items: flex-end;
      gap: 5px;
      margin-top: 18px;
      height: 30px;
    }

    .bar {
      width: 7px;
      background: linear-gradient(to top, #ff63b0, #ffffff);
      border-radius: 10px;
      animation: bounce 1s infinite ease-in-out;
      opacity: .9;
    }

    .bar:nth-child(2) { animation-delay: .1s; }
    .bar:nth-child(3) { animation-delay: .2s; }
    .bar:nth-child(4) { animation-delay: .3s; }
    .bar:nth-child(5) { animation-delay: .4s; }

    @keyframes bounce {
      0%,100% { height: 10px; }
      50% { height: 28px; }
    }

    .credits {
      position: absolute;

    }

    @media (max-width: 600px) {
      .player {
        width: 92vw;
        height: auto;
      }

      .screen-ui {
        top: 35%;
        width: 50%;
      }

      .track {
        font-size: 16px;
      }
    }

  <audio id="audio"></audio>

  <script>

    const songs = [
      {
        title: 'Butterfly Dreams',
        artist: 'Pink Crystal',
        src: 'songs/song1.mp3'
      },
      {
        title: 'Velvet Wings',
        artist: 'Moon Garden',
        src: 'songs/song2.mp3'
      },
      {
        title: 'Cherry Glow',
        artist: 'Sky Nectar',
        src: 'songs/song3.mp3'
      }
    ];

    let currentSong = 0;
    let isPlaying = false;

    const audio = document.getElementById('audio');
    const trackName = document.getElementById('trackName');
    const artistName = document.getElementById('artistName');
    const progress = document.getElementById('progress');
    const statusText = document.getElementById('statusText');

    const playPauseBtn = document.getElementById('playPause');
    const nextBtn = document.getElementById('nextBtn');
    const prevBtn = document.getElementById('prevBtn');
    const pauseBtn = document.getElementById('pauseBtn');

    function loadSong(index) {
      const song = songs[index];
      audio.src = song.src;
      trackName.textContent = song.title;
      artistName.textContent = song.artist;
    }

    function playSong() {
      audio.play();
      isPlaying = true;
      statusText.textContent = 'Playing';
      document.querySelector('.player').style.transform = 'scale(1.01)';
    }

    function pauseSong() {
      audio.pause();
      isPlaying = false;
      statusText.textContent = 'Paused';
      document.querySelector('.player').style.transform = 'scale(1)';
    }

    function togglePlay() {
      if (isPlaying) {
        pauseSong();
      } else {
        playSong();
      }
    }

    function nextSong() {
      currentSong++;

      if (currentSong >= songs.length) {
        currentSong = 0;
      }

      loadSong(currentSong);

      if (isPlaying) {
        playSong();
      }
    }

    function prevSong() {
      currentSong--;

      if (currentSong < 0) {
        currentSong = songs.length - 1;
      }

      loadSong(currentSong);

      if (isPlaying) {
        playSong();
      }
    }

    playPauseBtn.addEventListener('click', togglePlay);
    pauseBtn.addEventListener('click', togglePlay);
    nextBtn.addEventListener('click', nextSong);
    prevBtn.addEventListener('click', prevSong);

    audio.addEventListener('timeupdate', () => {

      if (!audio.duration) return;

      const percent = (audio.currentTime / audio.duration) * 100;
      progress.style.width = percent + '%';
    });

    audio.addEventListener('ended', () => {
      nextSong();
      playSong();
    });

    // subtle wing movement

    setInterval(() => {
      document.querySelector('.left-wing-group').style.transform =
        `rotate(${Math.sin(Date.now() / 600) * 2}deg)`;

      document.querySelector('.right-wing-group').style.transform =
        `rotate(${Math.sin(Date.now() / 600) * -2}deg)`;
    }, 30);

    loadSong(currentSong);

  </script>

</body>
