<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Butterfly iPod</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Futura:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 50%, rgba(239,96,163,0.12) 0%, transparent 70%),
      radial-gradient(ellipse 60% 50% at 80% 50%, rgba(239,96,163,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .scene {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 28px;
  }

  .player-wrap {
    position: relative;
    width: 595px;
    height: 510px;
    filter: drop-shadow(0 30px 60px rgba(239,96,163,0.35)) drop-shadow(0 10px 30px rgba(0,0,0,0.7));
    transition: filter 0.3s ease;
  }
  .player-wrap:hover {
    filter: drop-shadow(0 36px 72px rgba(239,96,163,0.45)) drop-shadow(0 14px 40px rgba(0,0,0,0.75));
  }

  /* ── Info panel ── */
  .info-panel {
    text-align: center;
    color: #fff;
    max-width: 340px;
  }
  .track-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.01em;
    color: #fff;
    margin-bottom: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .track-artist {
    font-size: 13px;
    color: rgba(239,96,163,0.85);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .progress-bar-wrap {
    margin-top: 10px;
    background: rgba(255,255,255,0.1);
    border-radius: 4px;
    height: 4px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #ef60a3, #f9b4d6);
    border-radius: 4px;
    transition: width 0.4s linear;
    width: 0%;
  }
  .time-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    margin-top: 4px;
  }

  /* ── SVG interactive zones ── */
  .btn-zone {
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-zone:hover { opacity: 0.75; }
  .btn-zone:active { opacity: 0.5; transform: scale(0.97); }

  /* ── Screen content ── */
  #screen-content {
    transition: opacity 0.3s;
  }

  /* ── Pulse ring on play ── */
  @keyframes pulseRing {
    0%   { r: 80; opacity: 0.6; }
    100% { r: 110; opacity: 0; }
  }
  .pulse-ring {
    animation: pulseRing 1.2s ease-out infinite;
    display: none;
  }
  .playing .pulse-ring { display: block; }

  /* ── Wing shimmer ── */
  @keyframes wingShimmer {
    0%,100% { opacity: 0.82; }
    50% { opacity: 0.95; }
  }
  .wing-group { animation: wingShimmer 3s ease-in-out infinite; }
  .wing-group-r { animation: wingShimmer 3s ease-in-out infinite 1.5s; }

  /* ── Antenna bounce ── */
  @keyframes antennaBounce {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }
  .antenna-tip { animation: antennaBounce 2.5s ease-in-out infinite; }
  .antenna-tip-r { animation: antennaBounce 2.5s ease-in-out infinite 1.25s; }

  /* ── Note float ── */
  @keyframes noteFloat {
    0% { opacity: 0; transform: translate(0,0) scale(0.5); }
    30% { opacity: 1; }
    100% { opacity: 0; transform: translate(var(--nx), var(--ny)) scale(1.2); }
  }
  .music-note {
    font-size: 18px;
    position: absolute;
    animation: noteFloat 2.2s ease-out forwards;
    pointer-events: none;
    color: rgba(249,180,214,0.9);
  }
</style>
</head>
<body>
<div class="scene">
  <div class="player-wrap" id="playerWrap">
    <svg id="butterflySVG" viewBox="0 0 595 510" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="595" height="510">

        <!-- Drop shadow filter for body -->

          <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#a03060" flood-opacity="0.35"/>
        </filter>
        <!-- Bevel filter -->
        <filter id="bevel" x="-5%" y="-5%" width="110%" height="110%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
          <feOffset dx="-2" dy="-2" result="offsetBlur"/>
          <feComposite in="SourceGraphic" in2="offsetBlur" operator="over"/>
        </filter>
        <!-- Wing blur/translucency -->
        <filter id="wingGlow" x="-10%" y="-10%" width="120%" height="120%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
          <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
        <!-- Wheel shadow -->
        <filter id="wheelShadow">
          <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#901050" flood-opacity="0.4"/>
        </filter>
        <!-- Inner shadow filter -->
        <filter id="innerShadow" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
          <feOffset dx="2" dy="4"/>
          <feComposite in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="shadowDiff"/>
          <feFlood flood-color="#802050" flood-opacity="0.3" result="color"/>
          <feComposite in="color" in2="shadowDiff" operator="in" result="shadow"/>
          <feComposite in="shadow" in2="SourceGraphic" operator="over"/>
        </filter>

        <clipPath id="screenClip">

        </clipPath>
      </defs>

      <!-- ══ LEFT WING (back layer) ══ -->

      <!-- Antenna tips -->

      <g class="antenna-tip-r">

      <!-- Next button zone -->
      <ellipse id="btn-next" cx="355" cy="392.26" rx="30" ry="30"
        fill="transparent" class="btn-zone" style="cursor:pointer"/>

      <ellipse id="btn-play" cx="296" cy="442" rx="30" ry="22"
        fill="transparent" class="btn-zone" style="cursor:pointer"/>

        fill="transparent" class="btn-zone" style="cursor:pointer"/>

    </svg>
  </div>

  <div class="info-panel" id="infoPanel">
    <div class="track-title" id="infoTitle">Select a track</div>

    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill"></div>

    <div class="time-row">
      <span id="timeElapsed">0:00</span>
      <span id="timeDuration">0:00</span>
    </div>
  </div>
</div>

<script>
const tracks = [
  { title: "Sugar Plum Fairy",  artist: "Dream Synth",   duration: 213, emoji: "🌸" },
  { title: "Neon Butterfly",    artist: "Electric Bloom", duration: 187, emoji: "🦋" },
  { title: "Candy Cloud",       artist: "Pastel Wave",   duration: 241, emoji: "🍬" },
  { title: "Pink Horizon",      artist: "Sunset Girl",   duration: 198, emoji: "🌅" },
  { title: "Glitter Rain",      artist: "Sparkle Pop",   duration: 222, emoji: "✨" },
  { title: "Moonpetal",         artist: "Lunar Haze",    duration: 265, emoji: "🌙" },
];

let currentTrack = 0;
let isPlaying = false;
let elapsed = 0;
let ticker = null;
let eqAnim = null;

const screenTitle   = document.getElementById('screenTitle');
const screenArtist  = document.getElementById('screenArtist');
const screenProgress= document.getElementById('screenProgress');
const screenElapsed = document.getElementById('screenElapsed');
const screenDuration= document.getElementById('screenDuration');
const screenPlayIcon= document.getElementById('screenPlayIcon');
const albumEmoji    = document.getElementById('albumEmoji');
const eqBars        = document.getElementById('eqBars');
const progressFill  = document.getElementById('progressFill');
const infoTitle     = document.getElementById('infoTitle');
const infoArtist    = document.getElementById('infoArtist');
const timeElapsed   = document.getElementById('timeElapsed');
const timeDuration  = document.getElementById('timeDuration');
const pulseRing     = document.getElementById('pulseRing');
const playerWrap    = document.getElementById('playerWrap');

function fmt(s) {
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

function loadTrack(idx) {
  const t = tracks[idx];
  screenTitle.textContent   = t.title;
  screenArtist.textContent  = t.artist;
  screenDuration.textContent= fmt(t.duration);
  timeDuration.textContent  = fmt(t.duration);
  albumEmoji.textContent    = t.emoji;
  infoTitle.textContent     = t.title;
  infoArtist.textContent    = t.artist;
  elapsed = 0;
  updateProgress();
}

function updateProgress() {
  const t = tracks[currentTrack];
  const pct = t.duration > 0 ? (elapsed / t.duration) * 100 : 0;
  screenProgress.setAttribute('width', (124 * pct / 100).toFixed(1));
  screenElapsed.textContent = fmt(elapsed);
  timeElapsed.textContent   = fmt(elapsed);
  progressFill.style.width  = pct.toFixed(1) + '%';
}

function startEQ() {
  eqBars.setAttribute('opacity','1');
  screenPlayIcon.setAttribute('opacity','0');
  clearInterval(eqAnim);
  const bars = [
    document.getElementById('eq1'),
    document.getElementById('eq2'),
    document.getElementById('eq3'),
    document.getElementById('eq4'),
    document.getElementById('eq5'),
    document.getElementById('eq6'),
  ];
  eqAnim = setInterval(() => {
    bars.forEach(b => {
      const h = 4 + Math.random() * 14;
      const y = 263 - h;
      b.setAttribute('height', h.toFixed(0));
      b.setAttribute('y', y.toFixed(0));
    });
  }, 130);
}

function stopEQ() {
  clearInterval(eqAnim);
  eqBars.setAttribute('opacity','0');
  screenPlayIcon.setAttribute('opacity','1');
}

function play() {
  isPlaying = true;
  screenPlayIcon.textContent = '⏸';
  playerWrap.classList.add('playing');
  startEQ();
  clearInterval(ticker);
  ticker = setInterval(() => {
    elapsed++;
    if (elapsed >= tracks[currentTrack].duration) {
      next();
    } else {
      updateProgress();
    }
  }, 1000);
}

function pause() {
  isPlaying = false;
  screenPlayIcon.textContent = '▶';
  playerWrap.classList.remove('playing');
  stopEQ();
  clearInterval(ticker);
}

function togglePlay() {
  if (isPlaying) pause(); else play();
  spawnNote();
}

function next() {
  currentTrack = (currentTrack + 1) % tracks.length;
  elapsed = 0;
  loadTrack(currentTrack);
  if (isPlaying) play();
  spawnNote();
}

function prev() {
  if (elapsed > 3) {
    elapsed = 0;
    updateProgress();
  } else {
    currentTrack = (currentTrack - 1 + tracks.length) % tracks.length;
    elapsed = 0;
    loadTrack(currentTrack);
  }
  if (isPlaying) play();
  spawnNote();
}

function spawnNote() {
  const emojis = ['♪','♫','🎵','🎶'];
  const el = document.createElement('div');
  el.className = 'music-note';
  el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
  const nx = (Math.random()-0.5)*80 + 'px';
  const ny = -(40 + Math.random()*60) + 'px';
  el.style.setProperty('--nx', nx);
  el.style.setProperty('--ny', ny);
  el.style.left = (200 + Math.random()*200) + 'px';
  el.style.top  = (350 + Math.random()*60) + 'px';
  document.querySelector('.scene').appendChild(el);
  setTimeout(() => el.remove(), 2200);
}

// Button events
document.getElementById('btn-play').addEventListener('click', togglePlay);
document.getElementById('btn-center').addEventListener('click', togglePlay);
document.getElementById('btn-next').addEventListener('click', next);
document.getElementById('btn-prev').addEventListener('click', prev);
document.getElementById('btn-menu').addEventListener('click', () => {
  pause();
  elapsed = 0;
  updateProgress();
});

// Keyboard controls
document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowRight') next();
  if (e.code === 'ArrowLeft')  prev();
});

// Init
loadTrack(0);
screenPlayIcon.textContent = '▶';
</script>
</body>
</html>
