<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Y2K Girl Desk</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    height:100vh;
    background:
        radial-gradient(circle at top,#ff9df2 0%, transparent 30%),
        linear-gradient(180deg,#ffb7ec 0%,#ffd7f6 45%,#d0b3ff 100%);
    font-family:'Orbitron',sans-serif;
}

/* sparkles */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background-image:
        radial-gradient(white 1px, transparent 1px);
    background-size:35px 35px;
    opacity:0.4;
    animation:twinkle 10s linear infinite;
    pointer-events:none;
}

@keyframes twinkle{
    from{transform:translateY(0);}
    to{transform:translateY(35px);}
}

.room{
    position:relative;
    width:100%;
    height:100%;
}

/* WALL */
.wall{
    position:absolute;
    inset:0 0 180px 0;
    background:
        linear-gradient(rgba(255,255,255,0.12),rgba(255,255,255,0)),
        linear-gradient(90deg,#ffc5ef,#ffd8f7,#f8bfff);
}

/* DESK */
.desk{
    position:absolute;
    bottom:0;
    width:100%;
    height:180px;
    background:
        linear-gradient(180deg,#ffb6d5,#ff8cc2);
    border-top:8px solid #ffecfa;
    box-shadow:0 -10px 40px rgba(0,0,0,0.15);
}

/* COMPUTER */
.computer{
    position:absolute;
    left:120px;
    bottom:160px;
}

.monitor{
    width:260px;
    height:180px;
    background:#e5e5e5;
    border-radius:16px;
    padding:12px;
    box-shadow:0 15px 30px rgba(0,0,0,0.25);
}

.screen{
    width:100%;
    height:100%;
    border-radius:10px;
    overflow:hidden;
    background:
        linear-gradient(135deg,#00e5ff,#ff00d4);
    position:relative;
}

.screen::before{
    content:"ONLINE ♥";
    position:absolute;
    top:20px;
    left:20px;
    font-family:'Press Start 2P',cursive;
    font-size:16px;
    color:white;
    text-shadow:0 0 10px white;
}

.screen::after{
    content:"★";
    position:absolute;
    right:20px;
    bottom:20px;
    font-size:50px;
    color:white;
    animation:spin 4s linear infinite;
}

.stand{
    width:90px;
    height:20px;
    background:#d8d8d8;
    margin:auto;
    border-radius:0 0 12px 12px;
}

.base{
    width:150px;
    height:18px;
    background:#ededed;
    margin:auto;
    border-radius:10px;
}

/* MAGAZINES */
.magazine{
    position:absolute;
    width:160px;
    height:210px;
    border-radius:12px;
    box-shadow:0 12px 24px rgba(0,0,0,0.2);
    overflow:hidden;
}

.mag1{
    left:470px;
    bottom:20px;
    transform:rotate(-8deg);
    background:
        linear-gradient(135deg,#ff5ec7,#ffef7d);
}

.mag2{
    left:560px;
    bottom:40px;
    transform:rotate(9deg);
    background:
        linear-gradient(135deg,#8d7dff,#ff8df7);
}

.magazine h2{
    color:white;
    padding:20px;
    font-size:24px;
    text-shadow:0 0 8px rgba(0,0,0,0.4);
}

.magazine p{
    color:white;
    padding:0 20px;
    font-size:14px;
}

/* IPOD */
.scene{
    position:absolute;
    right:240px;
    bottom:40px;
    transform:scale(0.75);
}

.ipod{
    width:340px;
    height:620px;
    border-radius:40px;
    background:linear-gradient(145deg,#f8f8f8,#d7d7d7);
    position:relative;
    box-shadow:
        0 20px 50px rgba(0,0,0,0.3),
        inset -8px -8px 12px rgba(255,255,255,0.8),
        inset 8px 8px 12px rgba(0,0,0,0.1);
}

.ipod-screen{
    width:270px;
    height:220px;
    background:linear-gradient(180deg,#92f7ff,#dbffff);
    margin:35px auto 0;
    border-radius:18px;
    border:8px solid #222;
    position:relative;
    overflow:hidden;
}

.song-info{
    text-align:center;
    margin-top:20px;
    color:#00111a;
}

.song-title{
    font-size:24px;
    font-weight:bold;
}

.artist{
    margin-top:10px;
    font-size:14px;
}

.disc{
    width:75px;
    height:75px;
    border-radius:50%;
    background:
        radial-gradient(circle,#fff 10%,#ff62f2 20%,#6ef9ff 60%,#fff 100%);
    position:absolute;
    left:50%;
    top:95px;
    transform:translateX(-50%);
}

.spin{
    animation:spin 2s linear infinite;
}

.visualizer{
    position:absolute;
    bottom:10px;
    width:100%;
    display:flex;
    justify-content:center;
    align-items:flex-end;
    gap:6px;
}

.bar{
    width:10px;
    height:12px;
    border-radius:10px;
    background:linear-gradient(to top,#ff00d4,#00f7ff);
    animation:bounce 1s infinite;
    animation-play-state:paused;
}

@keyframes bounce{
    0%{height:12px;}
    50%{height:70px;}
    100%{height:20px;}
}

.wheel{
    width:240px;
    height:240px;
    border-radius:50%;
    background:radial-gradient(circle at top left,#fff,#d6d6d6);
    margin:40px auto;
    position:relative;
}

.center-button{
    width:90px;
    height:90px;
    border-radius:50%;
    background:#f5f5f5;
    position:absolute;
    left:50%;
    top:50%;
    transform:translate(-50%,-50%);
}

.btn{
    position:absolute;
    color:#888;
    cursor:pointer;
    user-select:none;
    transition:0.2s;
}

.btn:hover{
    transform:scale(1.1);
    color:#ff00c8;
}

.menu{
    top:25px;
    left:50%;
    transform:translateX(-50%);
    font-size:16px;
}

.play{
    bottom:20px;
    left:50%;
    transform:translateX(-50%);
    font-size:28px;
}

.back{
    left:25px;
    top:50%;
    transform:translateY(-50%);
}

.next{
    right:25px;
    top:50%;
    transform:translateY(-50%);
}

.status{
    position:absolute;
    bottom:20px;
    width:100%;
    text-align:center;
    color:#ff00b7;
    font-size:12px;
    letter-spacing:3px;
}

/* NOKIA PHONE */
.nokia{
    position:absolute;
    right:40px;
    bottom:20px;
    width:160px;
    height:340px;
    border-radius:28px;
    background:
        linear-gradient(145deg,#ff9ef3,#d980ff);
    box-shadow:
        0 15px 35px rgba(0,0,0,0.25),
        inset 0 0 25px rgba(255,255,255,0.5);
    overflow:hidden;
}

.glitter{
    position:absolute;
    inset:0;
    background-image:
        radial-gradient(white 1px, transparent 1px);
    background-size:12px 12px;
    opacity:0.35;
    pointer-events:none;
}

.nokia-screen{
    width:110px;
    height:70px;
    margin:24px auto;
    background:#c6ffd8;
    border:5px solid #444;
    border-radius:10px;
    position:relative;
    overflow:hidden;
}

.phone-text{
    position:absolute;
    width:100%;
    top:20px;
    text-align:center;
    font-size:12px;
    color:#003300;
    font-family:'Press Start 2P',cursive;
}

.keypad{
    width:120px;
    margin:15px auto;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

.key{
    height:32px;
    border-radius:10px;
    background:#ffe0fa;
    box-shadow:
        inset 0 2px 4px rgba(255,255,255,0.7),
        inset 0 -2px 4px rgba(0,0,0,0.15);
    cursor:pointer;
    transition:0.1s;
}

.key:hover{
    background:#fff;
    transform:translateY(-2px);
}

.ringing{
    animation:ring 0.15s infinite alternate;
}

@keyframes ring{
    from{transform:rotate(-2deg);}
    to{transform:rotate(2deg);}
}

@keyframes spin{
    from{transform:translateX(-50%) rotate(0deg);}
    to{transform:translateX(-50%) rotate(360deg);}
}

.sticker{
    position:absolute;
    color:white;
    font-size:32px;
    text-shadow:0 0 10px rgba(255,255,255,0.9);
}

.s1{top:40px;right:180px;}
.s2{top:120px;left:420px;}
.s3{top:220px;right:480px;}
</style>
</head>

<body>

<div class="room">

    <div class="wall"></div>

    <div class="sticker s1">★</div>
    <div class="sticker s2">♥</div>
    <div class="sticker s3">✦</div>

    <!-- COMPUTER -->
    <div class="computer">
        <div class="monitor">
            <div class="screen"></div>
        </div>
        <div class="stand"></div>
        <div class="base"></div>
    </div>

    <!-- MAGAZINES -->
    <div class="magazine mag1">
        <h2>POPSTAR</h2>
        <p>QUIZ: Which Y2K icon are you?</p>
    </div>

    <div class="magazine mag2">
        <h2>GLITTER</h2>
        <p>Smile.dk poster inside ✨</p>
    </div>

    <!-- IPOD -->
    <div class="scene">
        <div class="ipod">

            <div class="ipod-screen">

                <div class="song-info">
                    <div class="song-title">Butterfly</div>
                    <div class="artist">Smile.dk</div>
                </div>

                <div class="disc" id="disc"></div>

                <div class="visualizer">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>

            </div>

            <div class="wheel">

                <div class="btn menu">MENU</div>
                <div class="btn back">⏮</div>
                <div class="btn next">⏭</div>
                <div class="btn play" id="playButton">▶</div>

                <div class="center-button"></div>
            </div>

            <div class="status" id="statusText">
                CLICK PLAY
            </div>

        </div>
    </div>

    <!-- NOKIA -->
    <div class="nokia" id="nokia">

        <div class="glitter"></div>

        <div class="nokia-screen">
            <div class="phone-text" id="phoneText">
                READY
            </div>
        </div>

        <div class="keypad">
            <div class="key"></div>
            <div class="key"></div>
            <div class="key"></div>

            <div class="key"></div>
            <div class="key"></div>
            <div class="key"></div>

            <div class="key"></div>
            <div class="key"></div>
            <div class="key"></div>

            <div class="key"></div>
            <div class="key"></div>
            <div class="key"></div>
        </div>
    </div>

    <div class="desk"></div>

</div>

<!-- AUDIO -->
<audio id="music">
    <source src="https://archive.org/download/smiledk-butterfly/Smile.dk%20-%20Butterfly.mp3" type="audio/mpeg">
</audio>

<!-- Nokia ringtone -->
<audio id="ringtone">
    <source src="https://cdn.pixabay.com/audio/2022/03/15/audio_4c2e02f4c4.mp3" type="audio/mpeg">
</audio>

<script>
const playButton = document.getElementById('playButton');
const music = document.getElementById('music');
const bars = document.querySelectorAll('.bar');
const disc = document.getElementById('disc');
const statusText = document.getElementById('statusText');

let playing = false;

playButton.addEventListener('click',()=>{

    if(!playing){

        music.play();

        bars.forEach(bar=>{
            bar.style.animationPlayState='running';
        });

        disc.classList.add('spin');

        playButton.textContent='⏸';
        statusText.textContent='NOW PLAYING';

        playing=true;

    }else{

        music.pause();

        bars.forEach(bar=>{
            bar.style.animationPlayState='paused';
        });

        disc.classList.remove('spin');

        playButton.textContent='▶';
        statusText.textContent='PAUSED';

        playing=false;
    }
});

/* NOKIA */

const keys = document.querySelectorAll('.key');
const ringtone = document.getElementById('ringtone');
const nokia = document.getElementById('nokia');
const phoneText = document.getElementById('phoneText');

keys.forEach(key=>{

    key.addEventListener('click',()=>{

        ringtone.currentTime = 0;
        ringtone.play();

        nokia.classList.add('ringing');

        phoneText.textContent='INCOMING';

        setTimeout(()=>{
            nokia.classList.remove('ringing');
            phoneText.textContent='READY';
        },3000);

    });

});
</script>

</body>
</html>
