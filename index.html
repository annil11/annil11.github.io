<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Butterfly iPod</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap');

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#060606;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  font-family:'DM Sans',sans-serif;
}

body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 20% 50%, rgba(239,96,163,.18), transparent 35%),
    radial-gradient(circle at 80% 50%, rgba(239,96,163,.12), transparent 35%);
  pointer-events:none;
}

.player{
  position:relative;
  width:650px;
  height:760px;
  display:flex;
  justify-content:center;
  align-items:center;
  filter:
    drop-shadow(0 40px 60px rgba(0,0,0,.8))
    drop-shadow(0 0 40px rgba(239,96,163,.25));
}

#podSvg{
  width:100%;
  height:100%;
  overflow:visible;
}

.music-note{
  position:absolute;
  color:#ffd5ea;
  font-size:24px;
  pointer-events:none;
  animation:floatNote 2.8s ease-out forwards;
  text-shadow:0 0 12px rgba(255,255,255,.7);
  z-index:999;
}

@keyframes floatNote{
  0%{
    opacity:0;
    transform:translate(0,0) scale(.4) rotate(0deg);
  }

  20%{
    opacity:1;
  }

  100%{
    opacity:0;
    transform:
      translate(var(--nx),var(--ny))
      scale(1.5)
      rotate(50deg);
  }
}

.info{
  position:absolute;
  top:265px;
  left:50%;
  transform:translateX(-50%);
  width:190px;
  text-align:center;
  pointer-events:none;
}

.track{
  color:#1f3645;
  font-size:14px;
  font-weight:700;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.artist{
  color:#456;
  font-size:10px;
  margin-top:3px;
  letter-spacing:.08em;
  text-transform:uppercase;
}

.progressWrap{
  width:100%;
  height:4px;
  background:rgba(255,255,255,.25);
  border-radius:999px;
  margin-top:10px;
  overflow:hidden;
}

.progress{
  width:0%;
  height:100%;
  background:linear-gradient(90deg,#ef60a3,#ffd2e7);
}

.time{
  margin-top:6px;
  color:#345;
  font-size:10px;
}

.btn{
  cursor:pointer;
}

.btn:active{
  opacity:.6;
}

.eq{
  opacity:0;
  transition:opacity .2s;
}

.playing .eq{
  opacity:1;
}

.playing #playIcon{
  opacity:0;
}

.eqbar{
  animation:eq 0.7s infinite ease-in-out;
  transform-origin:bottom;
}

.eqbar:nth-child(2){animation-delay:.1s;}
.eqbar:nth-child(3){animation-delay:.2s;}
.eqbar:nth-child(4){animation-delay:.3s;}
.eqbar:nth-child(5){animation-delay:.4s;}
.eqbar:nth-child(6){animation-delay:.5s;}

@keyframes eq{
  0%,100%{transform:scaleY(.4);}
  50%{transform:scaleY(1.2);}
}

</style>
</head>

<script>

const tracks = [
{
  title:'Butterfly',
  artist:'Custom Upload',
  file:'Butterfly(1).mp3'
},
{
  title:'...Baby One More Time',
  artist:'Britney Spears',
  file:'_Baby One More Time(1).mp3'
},
{
  title:'I Want It That Way',
  artist:'Backstreet Boys',
  file:'I Want It That Way(1).mp3'
}
];

const audio = new Audio();

let current = 0;
let playing = false;

const trackName = document.getElementById('trackName');
const artistName = document.getElementById('artistName');
const progress = document.getElementById('progress');
const timeText = document.getElementById('timeText');
const playIcon = document.getElementById('playIcon');
const player = document.getElementById('player');

function format(sec){
const m = Math.floor(sec/60);
const s = Math.floor(sec%60);
return `${m}:${s.toString().padStart(2,'0')}`;
}

function loadTrack(index){
const t = tracks[index];
trackName.textContent = t.title;
artistName.textContent = t.artist;
audio.src = t.file;
progress.style.width = '0%';
timeText.textContent = '0:00 / 1:00';
}

function play(){
audio.play();
playing = true;
player.classList.add('playing');
playIcon.textContent = '⏸';
spawnNotes(10);
}

function pause(){
audio.pause();
playing = false;
player.classList.remove('playing');
playIcon.textContent = '▶';
spawnNotes(5);
}

function toggle(){
if(playing){
pause();
}else{
play();
}
}

function next(){
current++;
if(current >= tracks.length){
current = 0;
}
loadTrack(current);
if(playing){
play();
}
spawnNotes(10);
}

function prev(){
current--;
if(current < 0){
current = tracks.length - 1;
}
loadTrack(current);
if(playing){
play();
}
spawnNotes(10);
}

function spawnNotes(count=1){
const notes = ['♪','♫','♬','🎵'];

for(let i=0;i<count;i++){

const el = document.createElement('div');
el.className = 'music-note';
el.textContent = notes[Math.floor(Math.random()*notes.length)];

const nx = (Math.random()-.5)*220 + 'px';
const ny = -(120 + Math.random()*180) + 'px';

el.style.setProperty('--nx',nx);
el.style.setProperty('--ny',ny);

el.style.left = (window.innerWidth/2 - 40 + Math.random()*80) + 'px';
el.style.top = (window.innerHeight/2 + 100 + Math.random()*80) + 'px';

el.style.fontSize = (18 + Math.random()*20) + 'px';

document.body.appendChild(el);

setTimeout(()=>{
el.remove();
},2800);
}
}

audio.addEventListener('timeupdate',()=>{

if(audio.currentTime >= 60){
next();
return;
}

const percent = (audio.currentTime / 60) * 100;
progress.style.width = percent + '%';
timeText.textContent = `${format(audio.currentTime)} / 1:00`;

if(Math.random() > .78){
spawnNotes(2);
}

});

audio.addEventListener('ended',()=>{
next();
});

document.getElementById('playBtn').addEventListener('click',toggle);
document.getElementById('centerBtn').addEventListener('click',toggle);
document.getElementById('nextBtn').addEventListener('click',next);
document.getElementById('prevBtn').addEventListener('click',prev);

document.addEventListener('keydown',e=>{
if(e.code === 'Space'){
e.preventDefault();
toggle();
}
if(e.code === 'ArrowRight') next();
if(e.code === 'ArrowLeft') prev();
});

loadTrack(0);

</script>

</body>
</html>
