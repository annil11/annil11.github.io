<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Y2K iPod Player</title>

<!-- Retro Y2K font -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
    }

    body{
        height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        overflow:hidden;
        background:
            radial-gradient(circle at top, #ff7ad9 0%, transparent 35%),
            radial-gradient(circle at bottom, #7afcff 0%, transparent 35%),
            linear-gradient(135deg,#1b0033,#060010 80%);
        font-family:'Orbitron',sans-serif;
    }

    /* floating sparkles */
    body::before{
        content:"";
        position:fixed;
        inset:0;
        background-image:
            radial-gradient(white 1px, transparent 1px);
        background-size:40px 40px;
        opacity:0.25;
        animation:stars 20s linear infinite;
        pointer-events:none;
    }

    @keyframes stars{
        from{transform:translateY(0);}
        to{transform:translateY(40px);}
    }

    .scene{
        perspective:1200px;
    }

    .ipod{
        width:340px;
        height:620px;
        border-radius:40px;
        background:linear-gradient(145deg,#f8f8f8,#cfcfcf);
        box-shadow:
            0 20px 60px rgba(0,0,0,0.6),
            inset -8px -8px 12px rgba(255,255,255,0.8),
            inset 8px 8px 12px rgba(0,0,0,0.1);
        position:relative;
        transform:rotateX(8deg) rotateY(-10deg);
        overflow:hidden;
    }

    .chrome{
        position:absolute;
        inset:0;
        border-radius:40px;
        border:2px solid rgba(255,255,255,0.8);
        pointer-events:none;
    }

    .screen{
        width:270px;
        height:220px;
        background:linear-gradient(180deg,#8defff,#d7fbff);
        margin:35px auto 0;
        border-radius:18px;
        border:8px solid #222;
        position:relative;
        overflow:hidden;
        box-shadow:
            inset 0 0 20px rgba(255,255,255,0.8),
            0 10px 20px rgba(0,0,0,0.2);
    }

    .screen::before{
        content:"";
        position:absolute;
        inset:0;
        background:
            linear-gradient(
                rgba(255,255,255,0.15),
                rgba(255,255,255,0.02)
            );
        pointer-events:none;
    }

    .visualizer{
        position:absolute;
        bottom:0;
        width:100%;
        height:90px;
        display:flex;
        align-items:flex-end;
        justify-content:center;
        gap:5px;
        padding-bottom:10px;
    }

    .bar{
        width:10px;
        height:10px;
        background:linear-gradient(to top,#ff00c8,#00f7ff);
        border-radius:10px;
        animation:bounce 1s infinite ease-in-out;
        animation-play-state:paused;
        box-shadow:0 0 10px #ff00c8;
    }

    .bar:nth-child(odd){
        animation-duration:0.7s;
    }

    .bar:nth-child(even){
        animation-duration:1.1s;
    }

    @keyframes bounce{
        0%{height:10px;}
        50%{height:70px;}
        100%{height:15px;}
    }

    .song-info{
        position:absolute;
        top:25px;
        width:100%;
        text-align:center;
        color:#04131b;
        text-shadow:0 0 5px rgba(255,255,255,0.8);
    }

    .song-title{
        font-size:22px;
        font-weight:700;
        margin-bottom:10px;
    }

    .artist{
        font-size:14px;
        opacity:0.8;
    }

    .disc{
        position:absolute;
        top:95px;
        left:50%;
        transform:translateX(-50%);
        width:70px;
        height:70px;
        border-radius:50%;
        background:
            radial-gradient(circle,#ffffff 10%,#ff69f8 20%,#7afcff 60%,#ffffff 100%);
        box-shadow:0 0 20px rgba(255,255,255,0.8);
    }

    .disc.spin{
        animation:spin 2s linear infinite;
    }

    @keyframes spin{
        from{transform:translateX(-50%) rotate(0deg);}
        to{transform:translateX(-50%) rotate(360deg);}
    }

    .wheel{
        width:240px;
        height:240px;
        background:radial-gradient(circle at top left,#ffffff,#d9d9d9);
        border-radius:50%;
        margin:40px auto;
        position:relative;
        box-shadow:
            inset -8px -8px 12px rgba(255,255,255,0.9),
            inset 8px 8px 12px rgba(0,0,0,0.12);
    }

    .center-button{
        position:absolute;
        width:95px;
        height:95px;
        background:linear-gradient(145deg,#dcdcdc,#fafafa);
        border-radius:50%;
        top:50%;
        left:50%;
        transform:translate(-50%,-50%);
        box-shadow:
            inset -5px -5px 8px rgba(255,255,255,0.9),
            inset 5px 5px 8px rgba(0,0,0,0.08);
    }

    .btn{
        position:absolute;
        color:#888;
        font-size:22px;
        user-select:none;
        transition:0.2s;
    }

    .btn:hover{
        transform:scale(1.1);
        color:#ff00c8;
        cursor:pointer;
    }

    .menu{
        top:22px;
        left:50%;
        transform:translateX(-50%);
        font-size:16px;
        font-weight:bold;
    }

    .play{
        bottom:25px;
        left:50%;
        transform:translateX(-50%);
        font-size:28px;
    }

    .back{
        left:30px;
        top:50%;
        transform:translateY(-50%);
    }

    .next{
        right:30px;
        top:50%;
        transform:translateY(-50%);
    }

    .glow{
        position:absolute;
        inset:-3px;
        border-radius:40px;
        border:3px solid rgba(122,252,255,0.5);
        filter:blur(8px);
        pointer-events:none;
    }

    .status{
        position:absolute;
        bottom:20px;
        width:100%;
        text-align:center;
        color:#ff00c8;
        font-size:12px;
        letter-spacing:2px;
    }

</style>
</head>
<body>

<div class="scene">
    <div class="ipod">

        <div class="glow"></div>

        <div class="screen">
            <div class="song-info">
                <div class="song-title">Butterfly</div>
                <div class="artist">Smile.dk</div>
            </div>

            <div class="disc" id="disc"></div>

            <div class="visualizer">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </div>

        <div class="wheel">

            <div class="btn menu">MENU</div>
            <div class="btn back">⏮</div>
            <div class="btn next">⏭</div>
            <div class="btn play" id="playButton">▶</div>

            <div class="center-button"></div>
        </div>

        <div class="status" id="statusText">
            CLICK PLAY
        </div>

        <div class="chrome"></div>

    </div>
</div>

<!-- 
IMPORTANT:
Replace this MP3 URL with your own hosted file if needed.
Github Pages can host the mp3 directly in your repo.
-->
<audio id="audio">
    <source src="https://archive.org/download/smiledk-butterfly/Smile.dk%20-%20Butterfly.mp3" type="audio/mpeg">
</audio>

<script>
    const playButton = document.getElementById('playButton');
    const audio = document.getElementById('audio');
    const bars = document.querySelectorAll('.bar');
    const disc = document.getElementById('disc');
    const statusText = document.getElementById('statusText');

    let isPlaying = false;

    playButton.addEventListener('click', () => {

        if(!isPlaying){
            audio.play();

            bars.forEach(bar => {
                bar.style.animationPlayState = 'running';
            });

            disc.classList.add('spin');

            playButton.textContent = '⏸';
            statusText.textContent = 'NOW PLAYING';
            isPlaying = true;

        } else {

            audio.pause();

            bars.forEach(bar => {
                bar.style.animationPlayState = 'paused';
            });

            disc.classList.remove('spin');

            playButton.textContent = '▶';
            statusText.textContent = 'PAUSED';
            isPlaying = false;
        }
    });

    audio.addEventListener('ended', () => {
        bars.forEach(bar => {
            bar.style.animationPlayState = 'paused';
        });

        disc.classList.remove('spin');
        playButton.textContent = '▶';
        statusText.textContent = 'FINISHED';
        isPlaying = false;
    });
</script>

</body>
</html>
